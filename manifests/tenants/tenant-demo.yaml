# tenant-demo.yaml — Demo TenantControlPlane for kind management cluster
# Apply with:
#   kubectl create namespace tenant-demo
#   kubectl apply -f manifests/tenants/tenant-demo.yaml
#
# NOTE: Kamaji validates TCP K8s version <= management cluster version
# With kind v1.34 management cluster, use v1.30.x for the TCP
apiVersion: kamaji.clastix.io/v1alpha1
kind: TenantControlPlane
metadata:
  name: tenant-demo
  namespace: tenant-demo
spec:
  dataStore: default
  controlPlane:
    deployment:
      replicas: 1
    service:
      serviceType: LoadBalancer
  kubernetes:
    version: v1.30.2
    kubelet:
      cgroupfs: systemd
  networkProfile:
    port: 6443
    certSANs:
      - "127.0.0.1"
  addons:
    coreDNS: {}
    kubeProxy: {}
    konnectivity:
      server:
        port: 8132
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
