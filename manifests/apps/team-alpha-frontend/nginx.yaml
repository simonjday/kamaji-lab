apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx
  namespace: team-alpha-frontend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
      - name: nginx
        image: nginx:alpine
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
---
apiVersion: v1
kind: Service
metadata:
  name: nginx
  namespace: team-alpha-frontend
spec:
  selector:
    app: nginx
  ports:
  - port: 80
    targetPort: 80
